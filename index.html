<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>No estás solo</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-[#0a0a0f] text-white min-h-screen p-4">
  <div class="max-w-2xl mx-auto">
    
    <h1 class="text-3xl font-bold text-purple-400 mb-2">No estás solo</h1>
    <p class="text-gray-400 mb-6">Historias anónimas. Lee, comparte, responde.</p>

    <div class="bg-gray-800 p-4 rounded-xl mb-6">
      <textarea id="storyInput" placeholder="Escribe lo que sientes... es 100% anónimo" 
        class="w-full bg-gray-900 p-3 rounded-lg text-white outline-none focus:ring-2 ring-purple-500"
        rows="3"></textarea>
      <button id="postBtn" class="mt-3 px-5 py-2 bg-purple-600 rounded-lg font-bold hover:bg-purple-700">
        Publicar
      </button>
      <p class="text-xs text-gray-500 mt-2">No datos personales. No instrucciones de autolesión.</p>
    </div>

    <div id="stories" class="space-y-4"></div>

    <div class="mt-8 p-4 bg-red-900/30 rounded-lg text-sm text-center">
      <p class="font-bold mb-1">Si estás en peligro:</p>
      <a href="tel:8001230024" class="text-red-400">México: 800 123 0024</a> | 
      <a href="https://findahelpline.com" target="_blank" class="text-red-400">Tu país</a>
    </div>
  </div>

  <script>
    const supabase = window.supabase.createClient(
      'https://jopwdvrlaqkdtxtvjopa.supabase.co', 
      'sb_publishable_S9I7kIntPNDqBQrQCXW4ow_8I3Btu-c'
    );
    
    const bannedWords = ['suicid', 'cortar', 'ahorcar', 'pastillas', 'sobredosis'];

    async function loadStories() {
      const { data, error } = await supabase
        .from('stories')
        .select('*, replies(*)')
        .order('created_at', { ascending: false })
        .limit(30);

      if (error) {
        console.error(error);
        return;
      }

      const container = document.getElementById('stories');
      container.innerHTML = '';
      
      data.forEach(story => {
        const div = document.createElement('div');
        div.className = 'bg-gray-800 p-4 rounded-xl';
        div.innerHTML = `
          <p class="mb-3 text-gray-200">${escapeHtml(story.message)}</p>
          
          <div class="flex gap-3 items-center mb-3">
            <button onclick="likeStory(${story.id}, ${story.likes})" 
              class="text-sm text-gray-400 hover:text-purple-400">
              ❤️ ${story.likes}
            </button>
          </div>

          <div class="pl-4 border-l-2 border-purple-600/50 space-y-2">
            ${story.replies.map(r => `<p class="text-sm text-gray-300">${escapeHtml(r.message)}</p>`).join('')}
          </div>

          <div class="mt-3 flex gap-2">
            <input placeholder="Responder con apoyo..." 
              class="flex-1 bg-gray-900 p-2 rounded-lg text-sm outline-none focus:ring-1 ring-purple-500 replyInput" 
              data-id="${story.id}">
            <button class="px-3 bg-purple-600 rounded-lg text-sm replyBtn" data-id="${story.id}">
              Enviar
            </button>
          </div>
        `;
        container.appendChild(div);
      });
      
      document.querySelectorAll('.replyBtn').forEach(btn => {
        btn.onclick = () => postReply(btn.dataset.id);
      });
    }

    async function postStory() {
      const msg = document.getElementById('storyInput').value.trim();
      if (!msg || msg.length < 10) return alert('Escribe un poco más');
      
      if (bannedWords.some(w => msg.toLowerCase().includes(w))) {
        return alert('No podemos publicar eso. Si necesitas ayuda inmediata, llama a tu línea local.');
      }
      
      await supabase.from('stories').insert({ message: msg });
      document.getElementById('storyInput').value = '';
      loadStories();
    }

    async function postReply(storyId) {
      const input = document.querySelector(`.replyInput[data-id="${storyId}"]`);
      const msg = input.value.trim();
      if (!msg) return;
      
      await supabase.from('replies').insert({ story_id: storyId, message: msg });
      input.value = '';
      loadStories();
    }

    async function likeStory(id, currentLikes) {
      await supabase.from('stories').update({ likes: currentLikes + 1 }).eq('id', id);
      loadStories();
    }

    function escapeHtml(text) {
      return text.replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }

    document.getElementById('postBtn').onclick = postStory;
    loadStories();
    setInterval(loadStories, 30000);
  </script>
</body>
</html>
