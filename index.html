<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AnimeKiller - Adivina el anime</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-gray-900 text-white">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    const ANIME_LIST = [
      { name: "Attack on Titan", img: "https://i.imgur.com/8Km9tLL.jpg" },
      { name: "Naruto", img: "https://i.imgur.com/8Km9tLL.jpg" },
      { name: "One Piece", img: "https://i.imgur.com/8Km9tLL.jpg" },
      { name: "Demon Slayer", img: "https://i.imgur.com/8Km9tLL.jpg" },
      { name: "Jujutsu Kaisen", img: "https://i.imgur.com/8Km9tLL.jpg" },
    ];

    function App() {
      const [todayAnime] = useState(ANIME_LIST[0]);
      const [guess, setGuess] = useState("");
      const [attempts, setAttempts] = useState([]);
      const [blurLevel, setBlurLevel] = useState(10);

      const handleGuess = () => {
        if (!guess) return;
        const correct = guess.toLowerCase() === todayAnime.name.toLowerCase();
        setAttempts([...attempts, { guess, correct }]);

        if (!correct && blurLevel > 2) {
          setBlurLevel(blurLevel - 2);
        }
        setGuess("");
      };

      return (
        <div className="min-h-screen flex-col items-center justify-center p-4">
          <h1 className="text-4xl font-bold mb-2 text-purple-400">AnimeKiller</h1>
          <p className="text-gray-400 mb-6">Adivina el anime en 6 intentos</p>

          <div className="w-64 h-64 mb-6 rounded-lg overflow-hidden">
            <img
              src={todayAnime.img}
              style={{ filter: `blur(${blurLevel}px)` }}
              className="w-full h-full object-cover transition-all duration-500"
              alt="Adivina"
            />
          </div>

          <div className="w-full max-w-md">
            {attempts.map((att, i) => (
              <div key={i} className={`p-2 mb-2 rounded ${att.correct? 'bg-green-600' : 'bg-red-600'}`}>
                {att.guess}
              </div>
            ))}
          </div>

          {attempts.length < 6 &&!attempts.some(a => a.correct) && (
            <div className="flex gap-2 mt-4 w-full max-w-md">
              <input
                value={guess}
                onChange={(e) => setGuess(e.target.value)}
                placeholder="Escribe el anime..."
                className="flex-1 p-3 rounded bg-gray-800 text-white outline-none"
              />
              <button
                onClick={handleGuess}
                className="px-6 py-3 bg-purple-600 rounded font-bold hover:bg-purple-700"
              >
                Probar
              </button>
            </div>
          )}

          {attempts.some(a => a.correct) && (
            <div className="mt-6 text-center">
              <p className="text-2xl font-bold text-green-400">¡Correcto!</p>
              <p className="text-gray-400">Era {todayAnime.name}</p>
            </div>
          )}
        </div>
      );
    }

    ReactDOM.render(<App />, document.getElementById('root'));
  </script>
</body>
</html>
